name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build web (mobile SPA → dist/)
        env:
          VITE_SUPABASE_URL: https://c--e41703b9-fbbf-41b1-bca6-ff39488d8f25-prod.lovable.cloud
          VITE_SUPABASE_PUBLISHABLE_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhsdW1kZ3Z6YXV0aWNvdnViaWNyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI5MDQxODMsImV4cCI6MjA5ODQ4MDE4M30.w7ZQ-QR1_RvW9o-YYw1vfpkWNNC9zuBq9bjzxhnRwnA
          VITE_SUPABASE_PROJECT_ID: hlumdgvzauticovubicr
        run: npm run build:mobile

      - name: Verify dist/index.html exists
        run: |
          if [ ! -f "dist/index.html" ]; then
            echo "::error::dist/index.html missing — mobile build did not produce a static SPA"
            ls -la dist || true
            exit 1
          fi
          echo "dist/ contents:"
          ls -la dist

      - name: Add Android platform
        run: |
          if [ ! -d "android" ]; then
            npx cap add android
          fi

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Build debug APK
        working-directory: android
        run: |
          chmod +x ./gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: harmix-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
